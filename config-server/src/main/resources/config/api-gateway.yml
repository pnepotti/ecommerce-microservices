server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-microservice
              uri: lb://product-microservice # Load Balancing vía Eureka
              predicates:
                - Path=/api/v1/products/**
            - id: order-microservice
              uri: lb://order-microservice
              predicates:
                - Path=/api/v1/orders/**
            - id: auth-microservice
              uri: lb://auth-microservice
              predicates:
                - Path=/api/v1/auth/**
            - id: customer-microservice
              uri: lb://customer-microservice
              predicates:
                - Path=/api/v1/customers/**

logging:
  level:
    root: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.ipc.netty: DEBUG
    reactor.netty: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"
  file:
    name: logs/api.log    
    max-size: 10MB
    max-history: 3

management:
    endpoints:
        web:
            exposure:
                include: health, info, prometheus
    endpoint:
        health:
            show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/