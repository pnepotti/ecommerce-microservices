server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-microservice
              uri: lb://product-microservice
              predicates:
                - Path=/api/v1/products/**
            - id: order-microservice
              uri: lb://order-microservice
              predicates:
                - Path=/api/v1/orders/**
            - id: auth-microservice
              uri: lb://auth-microservice
              predicates:
                - Path=/api/v1/auth/**
            - id: customer-microservice
              uri: lb://customer-microservice
              predicates:
                - Path=/api/v1/customers/**

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"

management:
    endpoints:
        web:
            exposure:
                include: health, info, prometheus, gateway
    endpoint:
        health:
            show-details: always
        gateway:
            enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/