server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        - id: product-microservice
          uri: lb://product-microservice # Load Balancing vía Eureka
          predicates:
            - Path=/api/v1/products/**

        - id: order-microservice
          uri: lb://order-microservice
          predicates:
            - Path=/api/v1/orders/**

        - id: auth-microservice
          uri: lb://auth-microservice
          predicates:
            - Path=/api/v1/auth/**

        - id: customer-microservice
          uri: lb://customer-microservice
          predicates:
            - Path=/api/v1/customers/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/