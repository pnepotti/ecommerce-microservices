server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_AUTHDB_PORT}/${POSTGRES_AUTHDB_DB}
    username: ${POSTGRES_AUTHDB_USER}
    password: ${POSTGRES_AUTHDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Cambiar a 'validate' o 'none' en producción
    database-platform: org.hibernate.dialect.PostgreSQLDialect