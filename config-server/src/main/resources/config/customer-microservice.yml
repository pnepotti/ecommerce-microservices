server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_CUSTOMERDB_PORT}/${POSTGRES_CUSTOMERDB_DB}
    username: ${POSTGRES_CUSTOMERDB_USER}
    password: ${POSTGRES_CUSTOMERDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:                                       
      connection-timeout: 5000                  
      initialization-fail-timeout: -1           
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: update # Cambiar a 'validate' o 'none' en producción
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          lob:
            non-contextual-creation: true    

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.paulonepotti.microservices: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"
  file:
    name: logs/customer-microservice.log    
    max-size: 10MB
    max-history: 3

management:
    endpoints:
        web:
            exposure:
                include: health, info, prometheus
    endpoint:
        health:
            show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/