server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_ORDERDB_PORT}/${POSTGRES_ORDERDB_DB}
    username: ${POSTGRES_ORDERDB_USER}
    password: ${POSTGRES_ORDERDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Cambiar a 'validate' o 'none' en producción
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.paulonepotti.microservices: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %thread{10} - %level{5} - %logger{36} - %msg%n"
  file:
    name: logs/order-microservice.log    
    max-size: 10MB
    max-history: 3

management:
    endpoints:
        web:
            exposure:
                include: health, info, prometheus
    endpoint:
        health:
            show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ 