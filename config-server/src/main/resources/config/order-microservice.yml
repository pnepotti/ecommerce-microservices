server:
  port: 8083
spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_ORDERDB_PORT}/${POSTGRES_ORDERDB_DB}
    username: ${POSTGRES_ORDERDB_USER}
    password: ${POSTGRES_ORDERDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Cambiar a 'validate' o 'none' en producción
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ 