version: '3.8'

services:
  product_db:
    image: postgres:16-alpine
    container_name: product_ms_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - ecommerce-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  order_db:
    image: postgres:16-alpine
    container_name: order_ms_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: orderdb
    ports:
      - "5433:5432" # Puerto 5433 para no chocar con el de productos
    networks:
      - ecommerce-network
    volumes:
      - orders_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: product_ms_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - ecommerce-network
    volumes:
      - ./servers.json:/pgadmin4/servers.json

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:
  orders_data: